<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f4f1ea"/>
  <defs>
    <pattern id="stripes" width="100%" height="10" patternUnits="userSpaceOnUse">
      <rect width="100%" height="6" fill="black" />
    </pattern>
    <mask id="textMask">
      <rect width="100%" height="100%" fill="white" />
      <rect width="100%" height="100%" fill="url(#stripes)" />
    </mask>
  </defs>

  <g font-family="Arial Black, sans-serif" font-weight="900" font-size="65" text-anchor="middle" letter-spacing="5">
    <text x="202" y="182" fill="#e65100">FLIGHT</text>
    <text x="202" y="252" fill="#e65100">CREW</text>
    
    <text x="200" y="180" fill="black">FLIGHT</text>
    <text x="200" y="250" fill="black">CREW</text>
  </g>
</svg>
